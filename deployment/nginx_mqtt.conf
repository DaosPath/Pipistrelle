user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

# The stream module handles Layer 4 TCP proxying (required for MQTT)
stream {
    upstream pipistrelle_backend {
        server 127.0.0.1:1883; # Loopback port to Pipistrelle plain TCP broker
    }

    server {
        listen 8883 ssl; # Listen for secure MQTT TLS connections
        
        proxy_pass pipistrelle_backend;
        
        # TLS/SSL Certificates (replace with your actual domain certs)
        ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

        # Enforce secure TLS versions (TLS 1.2 and TLS 1.3 only)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        
        # Session caching for fast reconnections
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        
        # Set large proxy timeouts to prevent closing active persistent MQTT connections
        proxy_timeout 24h;
        proxy_connect_timeout 5s;
    }
}
